{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "getting-started-app.fullname" . }}
  labels:
    {{- include "getting-started-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
  {{- $annotations := merge .Values.gateway.annotations .Values.commonAnnotations }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gateway.parentRefs }}
    - name: {{ required "A Gateway name is required when gateway is enabled" .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
    {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.path.type }}
            value: {{ .Values.gateway.path.value }}
      backendRefs:
        - name: {{ include "getting-started-app.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
