apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "getting-started-app.fullname" . }}-test-connection"
  labels:
    {{- include "getting-started-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: {{ include "getting-started-app.image" . | quote }}
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command:
        - sh
        - -c
        - |
          echo "Testing connection to {{ include "getting-started-app.fullname" . }}..."
          wget -qO- http://{{ include "getting-started-app.fullname" . }}:{{ .Values.service.port }}/items && \
            echo "SUCCESS: App is responding!" && \
            exit 0 || \
            echo "FAILED: App is not reachable" && \
            exit 1
